[pytest]
# pytest 配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=consensus_engine
    --cov-report=term-missing
    --cov-report=html
    --asyncio-mode=auto

# 标记
markers =
    integration: 集成测试（测试完整流程）
    unit: 单元测试（测试单个组件）
    slow: 慢速测试（执行时间较长）
    network: 需要网络连接的测试

# 覆盖率配置
[coverage:run]
source = consensus_engine
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
branch = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

[coverage:html]
directory = htmlcov
